# Sindbad — production stack (single-box). Build context is the repo root.
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
name: sindbad

services:
  # ── Edge: TLS termination + routing (Let's Encrypt HTTP-01) ──
  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    # File provider (not docker) — Docker Engine 29 rejects Traefik's pinned legacy
    # API version (1.24), and Traefik doesn't need the socket for static routing.
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_acme:/acme
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    networks: [edge]

  # ── Data services ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # The API tolerates MinIO being briefly unavailable and auto-creates its bucket.
    networks: [internal]

  # ── One-shot: apply migrations + seed, then exit (blocks api start) ──
  migrate:
    image: sindbad-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["sh", "-c", "./node_modules/.bin/prisma migrate deploy && node prisma/seed.mjs"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [internal]

  # ── Application services ──
  api:
    image: sindbad-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    # Routing is defined in infra/traefik/dynamic/dynamic.yml (file provider).
    networks: [edge, internal]

  web:
    image: sindbad-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    networks: [edge]

  admin:
    image: sindbad-admin:latest
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    networks: [edge]

networks:
  edge:
  internal:

volumes:
  pg_data:
  redis_data:
  minio_data:
  traefik_acme:
