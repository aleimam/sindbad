services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sindbad
      POSTGRES_PASSWORD: sindbad
      POSTGRES_DB: sindbad
    ports:
      - "5432:5432"
    volumes:
      - sindbad_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sindbad
      MINIO_ROOT_PASSWORD: sindbad123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sindbad_minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  sindbad_pg:
  sindbad_minio:
