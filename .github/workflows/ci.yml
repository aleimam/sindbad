name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

  # Auto-deploy runs in the SAME workflow (needs: build) — far more reliable than
  # a cross-workflow workflow_run trigger. Runs on push/dispatch to main only, and
  # skips cleanly until the DEPLOY_* secrets exist.
  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
    steps:
      - name: Check deploy is configured
        id: cfg
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY_B64" ]; then
            echo "Deploy secrets not fully set — skipping. Need DEPLOY_HOST + DEPLOY_SSH_KEY_B64."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.cfg.outputs.ready == 'true'
        run: |
          # Key is stored base64-encoded (single line) so paste can't flatten it.
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=25 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd /opt/sindbad && ./scripts/deploy.sh'
