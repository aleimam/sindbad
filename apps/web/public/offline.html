<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Sindbad</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f8fafc; }
      }
      .card { max-width: 22rem; text-align: center; }
      .mark {
        width: 72px; height: 72px; margin: 0 auto 20px;
        border-radius: 20px;
        background: linear-gradient(135deg, #2563eb, #1e3a8a);
        display: grid; place-items: center;
      }
      .mark svg { width: 40px; height: 40px; }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { font-size: 0.9rem; opacity: 0.7; margin: 0 0 20px; line-height: 1.5; }
      button {
        border: 0; border-radius: 999px; cursor: pointer;
        background: #2563eb; color: #fff; font-weight: 600;
        padding: 10px 22px; font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M120 268 L392 132 L326 396 L262 320 L214 356 L214 300 Z" fill="#fff" />
          <path d="M262 320 L214 300 L392 132 Z" fill="#bfdbfe" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Sindbad can't reach the network right now. Check your connection — your cached pages still work.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
