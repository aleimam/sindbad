name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

  # Auto-deploy runs in the SAME workflow (needs: build) — far more reliable than
  # a cross-workflow workflow_run trigger. Runs on push/dispatch to main only, and
  # skips cleanly until the DEPLOY_* secrets exist.
  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - name: Check deploy is configured
        id: cfg
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "Deploy secrets not set — skipping. Add DEPLOY_HOST/USER/SSH_KEY to enable."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.cfg.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            cd /opt/sindbad
            ./scripts/deploy.sh
